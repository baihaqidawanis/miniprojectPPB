version: '3.8'

services:
  minio:
    image: quay.io/minio/minio:latest
    container_name: minio_storage
    restart: unless-stopped
    ports:
      - "9000:9000"   # S3 API — dipakai Flutter
      - "9001:9001"   # Web Console — buka di browser
    environment:
      MINIO_ROOT_USER: adminadmin
      MINIO_ROOT_PASSWORD: password123
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO Client — hanya berjalan sekali untuk buat bucket + set policy public
  minio_init:
    image: quay.io/minio/mc:latest
    container_name: minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 adminadmin password123 &&
        mc mb --ignore-existing local/miniproject-pbb &&
        mc anonymous set download local/miniproject-pbb &&
        echo '✅ Bucket miniproject-pbb siap dengan akses public-read'
      "

volumes:
  minio_data:
